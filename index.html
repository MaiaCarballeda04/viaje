<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking & Cats: Peaceful Exploration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; background-color: #050811; overflow: hidden; font-family: sans-serif; color: #e2e8f0; }

        #canvas-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #canvas-3d:active { cursor: grabbing; }

        /* HUD simple de interacción */
        .hud-interaction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 20px 40px;
            z-index: 10;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 320px;
        }

        .hud-title {
            font-family: 'Cinzel', serif;
            color: #f59e0b;
            font-size: 1.2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .hud-status {
            font-family: 'Almendra', serif;
            font-size: 1.25rem;
            color: #cbd5e1;
        }

        .controls-box {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 8, 17, 0.7);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            border-left: 3px solid #f59e0b;
            z-index: 10;
            color: #94a3b8;
        }
        .controls-box span { color: #f59e0b; font-weight: bold; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="controls-box">
        <span>[WASD]</span> Caminar por la nieve<br>
        <span>[MOUSE]</span> Girar cámara 360°<br>
        <span>[E]</span> Mimar al gatito (cuando estés cerca)
    </div>

    <canvas id="canvas-3d"></canvas>

    <div class="hud-interaction">
        <h2 class="hud-title" id="action-title">Exploración Libre</h2>
        <p class="hud-status" id="action-status">Camina por el valle rúnico en busca de amigos peludos...</p>
    </div>

    <script>
        let scene, camera, renderer, player, cat, snowParticles;
        let keys = { w: false, a: false, s: false, d: false, e: false };
        
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngleX = 0; 
        let cameraAngleY = 0.3; 
        let cameraDistance = 10; 

        function init() {
            const canvas = document.getElementById('canvas-3d');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x060913);
            scene.fog = new THREE.FogExp2(0x060913, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Luces para que la armadura y todo se vea nítido
            const ambientLight = new THREE.AmbientLight(0x2e3b4e, 2.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(10, 30, 20);
            scene.add(sunLight);

            // Una hermosa e inmensa Luna de fondo
            const moonGeo = new THREE.SphereGeometry(8, 32, 32);
            const moonMat = new THREE.MeshBasicMaterial({ color: 0xfffae6 });
            const moon = new THREE.Mesh(moonGeo, moonMat);
            moon.position.set(0, 25, -80);
            scene.add(moon);

            // Suelo plano cubierto de nieve con una sutil cuadrícula nórdica
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            floorGeo.rotateX(-Math.PI / 2);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            scene.add(floor);

            const grid = new THREE.GridHelper(200, 50, 0x1f2937, 0x1f2937);
            grid.position.y = 0.01;
            scene.add(grid);

            // --- DISEÑO DEL VIKINGO (Low-poly con armadura y casco) ---
            player = new THREE.Group();

            // Cuerpo / Armadura Gris de Placas
            const armorMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.6, 1.4, 8),
                new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.4, metalness: 0.6 })
            );
            armorMesh.position.y = 0.7;
            player.add(armorMesh);

            // Cabeza (Piel)
            const headMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xffdbac })
            );
            headMesh.position.y = 1.6;
            player.add(headMesh);

            // Capa / Barba pelirroja
            const beardMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xd97706 }) // Naranja/Marrón vikingo
            );
            beardMesh.position.set(0, 1.4, -0.2); // Al frente de la cara
            player.add(beardMesh);

            // Casco de Hierro (Hemisferio)
            const helmetMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.33, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                new THREE.MeshStandardMaterial({ color: 0x1f2937, metalness: 0.8 })
            );
            helmetMesh.position.y = 1.75;
            player.add(helmetMesh);

            // Cuerno Izquierdo del Casco
            const hornL = new THREE.Mesh(
                new THREE.ConeGeometry(0.08, 0.3, 5),
                new THREE.MeshStandardMaterial({ color: 0xf8fafc })
            );
            hornL.position.set(-0.3, 1.9, 0);
            hornL.rotation.z = 0.6;
            player.add(hornL);

            // Cuerno Derecho del Casco
            const hornR = hornL.clone();
            hornR.position.x = 0.3;
            hornR.rotation.z = -0.6;
            player.add(hornR);

            player.position.set(0, 0, 0);
            scene.add(player);

            // --- DISEÑO DEL GATITO (Michi Naranja) ---
            cat = new THREE.Group();

            // Cuerpo del michi
            const catBody = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.25, 0.5),
                new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.8 }) // Naranja brillante
            );
            catBody.position.y = 0.125;
            cat.add(catBody);

            // Cabeza del michi
            const catHead = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xf97316 })
            );
            catHead.position.set(0, 0.3, -0.22);
            cat.add(catHead);

            // Orejitas
            const earL = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.08, 4), new THREE.MeshStandardMaterial({ color: 0xf97316 }));
            earL.position.set(-0.06, 0.42, -0.22);
            cat.add(earL);
            const earR = earL.clone();
            earR.position.x = 0.06;
            cat.add(earR);

            // Colita feliz
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3), new THREE.MeshStandardMaterial({ color: 0xf97316 }));
            tail.position.set(0, 0.3, 0.25);
            tail.rotation.x = 0.5;
            cat.add(tail);

            // Ubicar al gato un poco adelante del spawn del jugador
            cat.position.set(0, 0, -6);
            scene.add(cat);

            // Nieve ambiental cayendo
            const snowGeo = new THREE.BufferGeometry();
            const snowCount = 300;
            const snowPositions = new Float32Array(snowCount * 3);
            for(let i=0; i < snowCount * 3; i+=3) {
                snowPositions[i] = (Math.random() - 0.5) * 100;
                snowPositions[i+1] = Math.random() * 30;
                snowPositions[i+2] = (Math.random() - 0.5) * 100;
            }
            snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
            snowParticles = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
            scene.add(snowParticles);

            // Eventos de Mouse (Órbita 360°)
            canvas.addEventListener('mousedown', (e) => { isDragging = true; });
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
                cameraAngleX -= deltaMove.x * 0.007;
                cameraAngleY += deltaMove.y * 0.007;
                cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2.5, cameraAngleY));
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            window.addEventListener('mouseup', () => { isDragging = false; });
            canvas.addEventListener('mousedown', (e) => { previousMousePosition = { x: e.clientX, y: e.clientY }; });

            // Teclado
            window.addEventListener('keydown', (e) => { handleKey(e.key, true); });
            window.addEventListener('keyup', (e) => { handleKey(e.key, false); });
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function handleKey(key, isPressed) {
            let k = key.toLowerCase();
            if (k in keys) keys[k] = isPressed;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            let speed = 0.12;

            // Movimiento relativo a la orientación de la cámara
            if (keys.w) {
                player.position.x -= Math.sin(cameraAngleX) * speed;
                player.position.z -= Math.cos(cameraAngleX) * speed;
                player.rotation.y = cameraAngleX; // El vikingo mira hacia donde camina
            }
            if (keys.s) {
                player.position.x += Math.sin(cameraAngleX) * speed;
                player.position.z += Math.cos(cameraAngleX) * speed;
                player.rotation.y = cameraAngleX + Math.PI;
            }
            if (keys.a) {
                player.position.x -= Math.cos(cameraAngleX) * speed;
                player.position.z += Math.sin(cameraAngleX) * speed;
                player.rotation.y = cameraAngleX + Math.PI/2;
            }
            if (keys.d) {
                player.position.x += Math.cos(cameraAngleX) * speed;
                player.position.z -= Math.sin(cameraAngleX) * speed;
                player.rotation.y = cameraAngleX - Math.PI/2;
            }

            // --- LÓGICA DE PROXIMIDAD Y MIMOS ---
            let distance = player.position.distanceTo(cat.position);
            const titleElement = document.getElementById('action-title');
            const statusElement = document.getElementById('action-status');

            if (distance < 1.8) {
                // El jugador está lo suficientemente cerca del michi
                if (keys.e) {
                    titleElement.innerText = "❤️ ¡MIMANDO AL GATITO! ❤️";
                    statusElement.innerText = "El temible guerrero norteño baja la guardia. El michi ronronea feliz: *Prrr... Miau*";
                    
                    // Animación simple: el vikingo se inclina un poquito hacia adelante para acariciar
                    player.rotation.x = 0.2;
                    cat.rotation.y += 0.05; // El gatito da vueltas de alegría
                } else {
                    titleElement.innerText = "¡Encontraste un Michi Naranja!";
                    statusElement.innerText = "Mantén presionada la tecla [E] para llenarlo de mimos.";
                    player.rotation.x = 0;
                }
            } else {
                // Lejos del gato, todo normal
                titleElement.innerText = "Exploración Libre";
                statusElement.innerText = "Camina por el valle rúnico en busca de amigos peludos...";
                player.rotation.x = 0;
            }

            // Cámara en tercera persona siguiendo al Vikingo
            camera.position.x = player.position.x + cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.z = player.position.z + cameraDistance * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.y = player.position.y + cameraDistance * Math.sin(cameraAngleY);
            camera.lookAt(player.position.x, player.position.y + 1.0, player.position.z);

            // Movimiento infinito de la nieve
            const positions = snowParticles.geometry.attributes.position.array;
            for(let i = 1; i < positions.length; i += 3) {
                positions[i] -= 0.05;
                if (positions[i] < 0) positions[i] = 30;
            }
            snowParticles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
